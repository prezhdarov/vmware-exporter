name: test
on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'

permissions:
  contents: read

jobs:
  tests:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./...